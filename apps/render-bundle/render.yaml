# Render Blueprint — adjust service names / env after first deploy.
services:
  - type: web
    name: liquichain-web
    runtime: static
    rootDir: .
    buildCommand: |
      corepack enable
      corepack prepare pnpm@9.15.0 --activate
      pnpm install --frozen-lockfile
      pnpm --filter @nfs/shared build
      pnpm --filter @nfs/web build
    staticPublishPath: apps/web/out
    envVars:
      - key: NEXT_PUBLIC_CHAIN_ID
        value: "1337421"
      - key: NEXT_PUBLIC_RPC_URL
        value: https://YOUR-CHAIN-SERVICE.onrender.com/rpc
      - key: NEXT_PUBLIC_WS_URL
        value: wss://YOUR-CHAIN-SERVICE.onrender.com

  - type: web
    name: liquichain-chain
    runtime: docker
    dockerfilePath: ./apps/render-bundle/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: HOSTED_CHAIN_ID
        value: "1337421"
